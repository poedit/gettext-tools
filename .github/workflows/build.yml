name: Build

on: [push, pull_request]

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v6

    - name: Setup MSYS2 environment
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: mingw-w64-ucrt-x86_64-gcc automake autoconf pkg-config make zip patch tar xz

    - name: Download release tarballs
      run: make -j1 download

    - name: Build binaries
      run: make -j2 MAKE="make -j2"

    - uses: actions/upload-artifact@v7
      with:
        name: zip-archive
        path: build/gettext-tools*.zip

    - uses: nuget/setup-nuget@v4

    - name: Build NuGet package
      run: make nuget

    - uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: build/*.nupkg


  build-macos:
    name: Build for macOS
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v6

    - name: Install external dependencies
      run: brew bundle --file=macos/Brewfile

    - uses: maxim-lobanov/setup-xcode@v1

    - name: Build and test
      run: xcodebuild -project GettextTools.xcodeproj -scheme GettextTools -destination 'platform=macOS' test


  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: zip-archive

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          prerelease: true
          artifacts: "*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}


  publish-nuget:
    name: Publish to NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget-package

      - uses: nuget/setup-nuget@v4
        with:
          nuget-api-key: ${{ secrets.NUGET_API_KEY }}
          nuget-api-key-source: https://www.nuget.org/api/v2/package

      - name: Publish NuGet package
        run: nuget push *.nupkg -Source https://www.nuget.org/api/v2/package
